<header
  class="h-16 bg-bg-surface border-b border-border-base flex justify-between items-center px-6 transition-colors duration-300"
>
  <!-- Left: Title/Breadcrumb -->
  <div class="flex items-center gap-4">
    <h1 class="text-sm font-semibold text-text-muted uppercase tracking-wider">
      Laboratório de Calibração
    </h1>
  </div>

  <!-- Right: Actions -->
  <div class="flex items-center gap-4">
    <!-- Theme Toggle -->
    <app-theme-button />
    <!-- User Profile -->
    <div class="flex items-center gap-3 pl-4 border-l border-border-base">
      <div class="text-right hidden sm:block">
        <div class="text-sm font-semibold text-text-base">
          {{ authService.loggedUser()?.userName }}
        </div>
        <div class="text-xs text-text-muted">
          {{ authService.loggedUser()?.role }}
        </div>
      </div>
      <div
        class="h-8 w-8 rounded-full bg-bg-input flex items-center justify-center text-text-muted"
      >
        <span class="material-symbols-outlined text-lg">person</span>
      </div>
    </div>

    <!-- Logout -->
    <button
      (click)="logout()"
      class="flex items-center gap-1 text-sm font-medium text-red-500 hover:text-red-600 transition-colors ml-2 cursor-pointer"
    >
      <span class="material-symbols-outlined text-lg">logout</span>
      <span class="hidden sm:inline">Sair</span>
    </button>
  </div>
</header>
