<header
  class="w-full p-4 flex justify-between items-center bg-white dark:bg-slate-800 shadow-sm transition-colors duration-300"
>
  <div class="flex items-center gap-2 px-4">
    <span
      class="material-symbols-outlined text-slate-800 dark:text-white bg-blue-600 p-2 rounded-xl"
    >
      balance
    </span>
    <span class="text-xl font-bold text-slate-800 dark:text-white">MassLab</span>
  </div>

  <div class="flex items-center gap-4">
    <span
      class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider hidden sm:block"
    >
      Laboratório de Calibração
    </span>
    <button
      (click)="themeService.toggleTheme()"
      class="cursor-pointer p-2 px-4 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 transition-colors"
      [attr.aria-label]="themeService.isDarkMode() ? 'Ativar modo claro' : 'Ativar modo escuro'"
    >
      @if (themeService.isDarkMode()) {
        <!-- Sun icon -->
        <span class="material-symbols-outlined">light_mode</span>
      } @else {
        <!-- Moon icon -->
        <span class="material-symbols-outlined">dark_mode</span>
      }
    </button>
  </div>
</header>
