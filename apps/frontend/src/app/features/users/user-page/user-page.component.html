@if (loggedUser(); as user) {
  <app-user-header [loggedUser]="user" />

  @if (canAccessUserList()) {
    <app-user-list />
  } @else {
    <div class="p-6">
      <div
        class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-6 py-4"
      >
        <div class="text-sm font-medium text-gray-900 dark:text-white">Acesso restrito</div>
        <div class="text-sm text-gray-600 dark:text-gray-300">
          A lista de usuários está disponível apenas para Administrador e Gerente.
        </div>
      </div>
    </div>
  }
}
