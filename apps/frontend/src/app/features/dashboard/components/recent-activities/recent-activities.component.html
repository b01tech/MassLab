<div class="bg-bg-surface rounded-2xl p-6 shadow-sm border border-border-base h-full transition-colors duration-300">
  <h3 class="text-lg font-bold text-text-base mb-6">Atividades Recentes</h3>
  
  <div class="space-y-6">
    @for (activity of activities; track activity.id) {
      <div class="flex items-start justify-between group">
        <div class="flex gap-4">
          <div class="mt-1.5 h-2.5 w-2.5 rounded-full" [ngClass]="activity.color"></div>
          <div>
            <div class="font-medium text-text-base">{{ activity.title }}</div>
            <div class="text-sm text-text-muted mt-0.5">
              {{ activity.user }} • {{ activity.time }}
            </div>
          </div>
        </div>
        <div class="text-sm font-medium text-text-muted group-hover:text-primary transition-colors">
          {{ activity.ref }}
        </div>
      </div>
    }
  </div>
</div>
